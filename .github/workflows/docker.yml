name: Publish Docker image

on:
  workflow_dispatch:
  push:
    branches:
      - 'master'
      - 'beta'
      - 'hotfix/*'
    tags:
      - 'v*.*.*'

# UniFi Controller version - update UNIFI_VERSION to upgrade
env:
  UNIFI_VERSION: "10.3.58"
  TEST_TAG: networkconcern/unifi:test

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare
        id: prep
        run: |
          echo "pkgurl=https://dl.ui.com/unifi/${{ env.UNIFI_VERSION }}/unifi_sysvinit_all.deb" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and export to Docker (test)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: ${{ env.TEST_TAG }}
          build-args: |
            PKGURL=${{ steps.prep.outputs.pkgurl }}

      - name: Test image
        run: |
          docker run -d --rm --name unifitest ${{ env.TEST_TAG }}
          sleep 35
          for i in $(seq 1 10); do
            STATUS=$(docker inspect --format='{{json .State.Health.Status}}' unifitest 2>/dev/null || echo '"unknown"')
            [ "$STATUS" = '"healthy"' ] && break || sleep 35
          done
          STATUS=$(docker inspect --format='{{json .State.Health.Status}}' unifitest)
          [ "$STATUS" = '"healthy"' ] || (docker logs unifitest && exit 1)
          docker stop unifitest

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern=v{{version}}
            type=semver,pattern=v{{major}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=ref,event=branch
          images: |
            networkconcern/unifi
            ghcr.io/${{ github.repository }}

      - name: Build and push container image
        id: docker_build
        uses: docker/build-push-action@v6
        with:
          context: .
          provenance: false
          platforms: linux/arm64/v8,linux/amd64
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            PKGURL=${{ steps.prep.outputs.pkgurl }}

      - name: Image digest
        run: echo ${{ steps.docker_build.outputs.digest }}
